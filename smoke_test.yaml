# Smoke test config — 2 epochs on 20 synthetic samples
data_root: "smoke_test_data"
data_json: "smoke_test_data/manifest.json"

model_variant: 'default'   # 'default' or 'lite'

num_epochs: 2
batch_size: 2
seed: 42
learning_rate: 0.0001
lr_scheduler: 'cosine'
lr_min: 1.0e-6
img_size: 512
num_workers: 0
pin_memory: false

lambda_blend_mse: 1.0
lambda_image_mse: 1.0
lambda_perc: 0.1
lambda_tv: 0.1

lr_step_size: 50
lr_gamma: 0.1

save_dir: "weights-smoke_test"
pretrained_path: ""
save_interval: 1
start_epoch: 0

device: "auto"
test: true
use_mlflow: false
project_name: "smoke_test"
