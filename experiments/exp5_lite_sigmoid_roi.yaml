# Experiment 5: Lite model + Sigmoid + ROI crop
# Same as exp3 but with ROI crop enabled — UNet sees only the bottom 50% of the face.

# Dataset configuration
data_root: "/workspace"
data_json: "/workspace/double_chin_data_v3/data_v3_data_final.json"

# Data curation
exclude_sources: ['aadan_double_chin']
ssim_csv: '/workspace/double_chin_data_v3/ssim_metrics.csv'                             # set to ssim_metrics.csv path to enable
ssim_exclude_tiers: ['significant']
identity_map: '/workspace/double_chin_data_v3/identity_map.json'                         # set to identity_map.json path to enable
train_ratio: 0.9

# Reproducibility
seed: 42

# Model — lite UNet with standard sigmoid
model_variant: 'lite'               # BaseUNetHalfLite (bilinear down/up, fewer layers)
last_layer_activation: 'sigmoid'    # standard sigmoid output [0, 1]
blend_scale: 0.5                    # unused for sigmoid, kept for compatibility

# ROI crop — crop to bottom N% of face before UNet (Lite variant only)
roi_crop_enabled: true               # enable bottom-crop ROI focus
roi_crop_fraction: 0.5               # fraction of image height to keep (bottom 50%)

# Training parameters
num_epochs: 200
batch_size: 24
learning_rate: 0.0001
img_size: 1024
num_workers: 8

# Loss weights
lambda_blend: 1.0
lambda_blend_masked: 1.0
lambda_blend_unmasked: 0.0
lambda_image_mse: 0.0
lambda_perc: 0.1
lambda_tv: 0.1
blend_mask_threshold: 0.02

# Learning rate scheduler
lr_scheduler: 'cosine'
lr_step_size: 50
lr_gamma: 0.1
lr_min: 1.0e-6

# Checkpoint settings
save_dir: 'weights-blend-maps/'
pretrained_path: ''
resume_path: ''
save_interval: 5
start_epoch: 0
early_stopping_patience: 30

# Distributed training
port: 12351

# MLflow logging
test: false
use_mlflow: true
mlflow_tracking_uri: 'https://mlflow.aftershoot.dev/'
project_name: 'vk-dbc-blendmap-exp'
run_name: 'exp5-lite-sigmoid-roi50'
