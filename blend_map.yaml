# Default configuration for skin retouching model training

# Dataset configuration
data_root: "/workspace"
data_json: "/workspace/double_chin_data_v3/data_v3_data_final.json"

# Data curation filters (applied in order in create_data_loaders)
exclude_sources: ['aadan_double_chin']    # source values to drop from JSON manifest

# SSIM-based data filtering (from tools/analyze_ssim.py output)
# Set ssim_csv to the path of ssim_metrics.csv; ssim_exclude_tiers lists the
# tiers to drop.  Leave ssim_csv empty to disable.
ssim_csv: ''                             # e.g. '/workspace/ssim_analysis_v4/ssim_metrics.csv'
ssim_exclude_tiers: ['significant']       # negligible | mild | moderate | significant

# Identity-aware train/val split
identity_map: ''                       # path to identity_map.json (empty = legacy random split)
train_ratio: 0.9                       # fraction of data for training

# Reproducibility
seed: 42

# Model
model_variant: 'lite'              # 'default' (BaseUNetHalf) or 'lite' (BaseUNetHalfLite — bilinear down/up, fewer layers)
last_layer_activation: 'residual_tanh'  # 'sigmoid' or 'residual_tanh' (0.5 + scale*tanh, centered at neutral)
blend_scale: 0.3                    # only for residual_tanh: 0.5 → [0,1], 0.3 → [0.2,0.8] (covers 99.93% of real data)
roi_crop_enabled: false             # true → use BaseUNetHalfLiteROI (crop bottom fraction, 1.9× faster)
roi_crop_fraction: 0.5              # bottom fraction to crop (0.5 = bottom 50%); also used for ROI metrics in validation

# Training parameters
num_epochs: 150
batch_size: 8
learning_rate: 0.0001
img_size: 1024
num_workers: 4

# Loss weights
lambda_blend: 1.0
lambda_blend_masked: 1.0
lambda_blend_unmasked: 0.0
lambda_image_mse: 1.0
lambda_perc: 0.1
lambda_tv: 0.1
blend_mask_threshold: 0.02

# Learning rate scheduler
lr_scheduler: 'cosine'   # 'cosine' (CosineAnnealingLR) or 'step' (StepLR)
lr_step_size: 50          # only used if lr_scheduler=step
lr_gamma: 0.1             # only used if lr_scheduler=step
lr_min: 1.0e-6            # only used if lr_scheduler=cosine

# Checkpoint settings
save_dir: 'weights-blend-maps/'
pretrained_path: ''      # Path to pretrained model (empty for training from scratch)
resume_path: ''          # Path to full checkpoint to resume training (includes optimizer/scheduler/epoch)
save_interval: 5         # Save checkpoint every N epochs
start_epoch: 0           # Starting epoch (useful for resuming training)
early_stopping_patience: 30  # Stop if no metric improves for N epochs (0 = disabled)

# Distributed training
port: 12350

# MLflow logging
test: false
use_mlflow: true
mlflow_tracking_uri: 'https://mlflow.aftershoot.dev/'  # Local directory or remote MLflow server URI
project_name: 'blend_maps_v3_2'  # MLflow experiment name
run_name: ''                     # MLflow run name (empty = auto-generated)
